services:
  - type: web
    name: sistema-gestion-efectivo-backend
    runtime: node
    plan: starter
    region: virginia
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DB_SSL
        value: "true"
      - key: DB_POOL_MAX
        value: "10"
      - key: DB_IDLE_TIMEOUT_MS
        value: "10000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "7"
      - key: ALLOW_BOOTSTRAP
        value: "false"
      - key: HF_MODEL
        value: Qwen/Qwen2.5-72B-Instruct
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: HF_TOKEN
        sync: false